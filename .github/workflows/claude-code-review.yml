name: Claude Code Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    if: |
      github.event.pull_request.user.login != 'renovate[bot]' &&
      github.event.pull_request.user.login != 'renovate' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'dependabot' &&
      github.event.pull_request.user.login != 'claude[bot]' &&
      github.event.pull_request.user.login != 'claude'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if merge commit
        id: check_commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" == "Merge branch"* ]] || [[ "$COMMIT_MSG" == "Merge pull request"* ]]; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
            echo "Merge commit detected. Skipping review."
          else
            echo "is_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.check_commit.outputs.is_merge == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            このPRをレビューしてください。

            【評価対象の差分の決め方】コードレビューで対象とする差分は次のとおりとする。
            - PR description の先頭付近に「Parent: ブランチ名」という行がある場合: そのブランチを親とみなし、親ブランチとこのPRのHEADとの差分のみをレビュー対象とする。親PRで既に入っている変更はレビューしない（スタックPR運用）。
            - Parent 行がない場合: このPRの base ブランチ（例: develop）とHEADの差分をレビュー対象とする。
            - main との差分は対象にしない。上記で決まった「レビュー対象の差分」に含まれるファイル・行だけにコメントすること。変更されていないファイル・行にはコメントしないこと。

            【差分の取得手順】レビューを始める前に必ず以下の手順を厳守すること。
            1. `gh pr view ${{ github.event.pull_request.number }} --json body -q .body` を実行し、現在の PR body の先頭付近から「Parent: xxx」形式の行を探す。
            2. Parent 行があった場合（スタックPRの場合）:
               - 【絶対厳守】`gh pr diff` は絶対に使用しないこと！
               - 必ず `git fetch origin xxx` で親ブランチを取得する。
               - その後、`git diff origin/xxx...HEAD` を実行し、そのコマンドが直接出力した差分（親ブランチからの純粋な変更分）だけをメモリに保持してレビュー対象とする。
            3. Parent 行がなかった場合のみ:
               - `gh pr diff ${{ github.event.pull_request.number }}` を使用して差分を取得する。
            4. 上記で得た「純粋な差分」に含まれる行に対してのみインラインコメントする。差分に含まれない既存コードや親ブランチのコードには絶対にコメントしないこと。

            【指摘の出し方】指摘件数に制限をかけないこと。このPRの差分について気づいた問題・改善点はすべて、該当する差分行に対してインラインコメントで指摘すること。重要度の高いものから3件だけ選ぶのではなく、思いついた指摘を漏らさずすべて出してください。

            【必須】指摘する前に、必ず同種の他ファイルを参照すること：
            - 同じ機能の他クラス（例: 変更が Controller だけなら対応する Request / Resource / Test も読む）
            - プロジェクト内の既存パターン（バリデーション、レスポンス形式、テストの書き方）と照らし合わせる
            - 指摘する場合は「他と比べて変」ではなく、具体的に「〇〇.php の △△ のように揃える」と書く

            以下の観点で確認し、問題があればすべて指摘してください：
            - バグや潜在的な問題
            - セキュリティ上の懸念
            - パフォーマンスの問題
            - 他ファイルとの一貫性（上記の参照をした上で）

            問題点・改善点がある場合は、該当する差分行に対してインラインコメントで指摘すること。問題がひとつもなければ「LGTM」とだけ回答してください。
            日本語でレビューしてください。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*), Bash(gh pr diff:*), Bash(gh pr view:*), Bash(git fetch:*), Bash(git diff:*)"
